# L2 strategies. stage: paper -> small -> full (quarantine ramp; promotions are
# manual config edits, gated on forward performance).
# This file is managed by the finora web UI; hand-written comments are not preserved.
strategies:
- name: momentum_baseline
  kind: momentum
  stage: paper
  capital_fraction: 1.0
  params:
    lookback_days: 126
    top_k: 20
- name: rsi_spy
  kind: rsi
  stage: paper
  capital_fraction: 1.0
  params:
    symbol: SPY
    period: 14
    buy_below: 30
    sell_above: 70
    rearm: 50
    unit_fraction: 0.25
    max_units: 4
- name: ma_cross_spy
  kind: ma_cross
  stage: paper
  capital_fraction: 1.0
  params:
    symbol: SPY
    fast_days: 50
    slow_days: 200
    weight: 1.0
- name: boll_spy
  kind: bollinger
  stage: paper
  capital_fraction: 1.0
  params:
    symbol: SPY
    period: 20
    num_std: 2.0
    weight: 1.0
- name: qlib_lgb_alpha158
  kind: qlib
  stage: paper
  capital_fraction: 1.0
  params:
    model_dir: artifacts/models/qlib_lgb_alpha158
    top_k: 30
    n_drop: 3
    benchmark: SPY
    train:
    - '2015-01-01'
    - '2021-12-31'
    valid:
    - '2022-01-01'
    - '2022-12-31'
    test:
    - '2023-01-01'
    - '2024-12-31'
